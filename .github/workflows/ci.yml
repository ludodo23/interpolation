name: C++ CI - Conan Install, Build, Create

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python for Conan
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Install Conan
      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan

      # 4️⃣ Configure default Conan profile
      - name: Configure Conan profile
        run: |
          conan profile new default --detect || true
          conan profile update settings.compiler.cppstd=17 default

      # 5️⃣ Install dependencies
      - name: Conan Install
        run: conan install . --build=missing

      # 6️⃣ Build the project
      - name: Conan Build
        run: conan build .

      # 7️⃣ Create the package and test
      - name: Conan Create
        run: conan create . user/testing --build=missing